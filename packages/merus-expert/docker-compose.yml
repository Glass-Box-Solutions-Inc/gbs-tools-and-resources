# merus-expert Docker Compose — local development

version: "3.9"

services:
  merus-expert:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: merus-expert:latest
    container_name: merus-expert
    env_file:
      - .env
    environment:
      - MERUSCASE_TOKEN_FILE=/app/.auth/.meruscase_token
    ports:
      - "8000:8000"
    volumes:
      - /opt/merus-expert/.meruscase_token:/app/.auth/.meruscase_token:ro
      - merus-data:/data
      - merus-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  merus-data:
    driver: local
  merus-logs:
    driver: local
