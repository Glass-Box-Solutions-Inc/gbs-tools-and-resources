# @Developed & Documented by Glass Box Solutions, Inc. using human ingenuity and modern technology
#
# Agentic Debugger — Project-Agnostic Workflow Template
# Copy to .github/workflows/agentic-debugger.yml in your repo.
# Configure .agentic-debugger.json in your repo root for project-specific settings.

name: Agentic Debugger

on:
  workflow_dispatch:
    inputs:
      test_failure_log:
        description: "Test failure output excerpt (max 4000 chars)"
        required: true
        type: string
      attempt_number:
        description: "Current debug attempt number (0-indexed)"
        required: true
        type: string
      commit_sha:
        description: "The commit SHA that triggered the CI failure"
        required: true
        type: string
      linear_ticket_id:
        description: "Linear ticket ID to update with progress (optional)"
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "20"

jobs:
  debug:
    name: "Agentic Debug — Attempt ${{ inputs.attempt_number }}"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install project dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          fi

      - name: Re-run tests to capture fresh failure output
        continue-on-error: true
        run: |
          set +e
          touch current-failures.txt
          npm test 2>&1 | tee -a current-failures.txt || true
          exit 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run debug agent
        id: debug_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ATTEMPT_NUMBER: ${{ inputs.attempt_number }}
        continue-on-error: true
        run: |
          CURRENT_FAILURES_FILE="$(pwd)/current-failures.txt"
          export CURRENT_FAILURES_FILE
          set +e
          node scripts/debug-agent.mjs
          AGENT_EXIT=$?
          set -e
          echo "exit_code=${AGENT_EXIT}" >> $GITHUB_OUTPUT
          exit $AGENT_EXIT

      - name: Escalate on environmental failure (exit 2)
        if: steps.debug_agent.outputs.exit_code == '2' && inputs.linear_ticket_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TICKET_ID="${{ inputs.linear_ticket_id }}"
          if [ -z "$TICKET_ID" ] || [ "$TICKET_ID" = "null" ] || [ -z "$LINEAR_API_KEY" ]; then exit 0; fi

          UPDATE_BODY=$(jq -n --arg id "$TICKET_ID" '{
            query: "mutation UpdateIssue($id: String!) { issueUpdate(id: $id, input: { title: \"🚨 HUMAN REQUIRED — environmental CI failure\" }) { success } }",
            variables: { id: $id }
          }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_BODY"

          COMMENT_BODY=$(jq -n --arg issueId "$TICKET_ID" \
            --arg body "🤖 **Debug agent skipped:** Environmental failure detected. **Manual investigation required.** [Workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            '{ query: "mutation AddComment($issueId: String!, $body: String!) { commentCreate(input: { issueId: $issueId, body: $body }) { success } }", variables: { issueId: $issueId, body: $body } }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY"

      - name: Fail job if agent errored (exit 1)
        if: steps.debug_agent.outputs.exit_code == '1'
        run: |
          echo "Debug agent failed (exit 1). See logs above."
          exit 1

      - name: Configure git identity
        if: steps.debug_agent.outputs.exit_code == '0'
        run: |
          git config user.name "GBS Agentic Debugger"
          git config user.email "agentic-debugger@glassboxsolutions.com"

      - name: Commit and push agent fixes
        id: push
        if: steps.debug_agent.outputs.exit_code == '0'
        run: |
          ATTEMPT="${{ inputs.attempt_number }}"
          NEXT_ATTEMPT=$((ATTEMPT + 1))
          BRANCH=$(git rev-parse --abbrev-ref HEAD)

          git add -A
          if git diff --staged --quiet; then
            echo "No changes produced by debug agent — nothing to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "$(cat <<EOF
          fix(ci): agentic debug attempt ${NEXT_ATTEMPT}

          Automated fix attempt ${NEXT_ATTEMPT}/5 for commit ${{ inputs.commit_sha }}

          Co-Authored-By: GBS Agentic Debugger <agentic-debugger@glassboxsolutions.com>
          EOF
          )"

          git fetch origin "$BRANCH"
          git rebase "origin/$BRANCH"
          git push origin "$BRANCH"
          echo "committed=true" >> $GITHUB_OUTPUT
          echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update Linear ticket (if configured)
        if: always() && inputs.linear_ticket_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TICKET_ID="${{ inputs.linear_ticket_id }}"
          ATTEMPT="${{ inputs.attempt_number }}"
          NEXT_ATTEMPT=$((ATTEMPT + 1))
          COMMITTED="${{ steps.push.outputs.committed }}"
          NEW_SHA="${{ steps.push.outputs.new_sha }}"

          if [ -z "$TICKET_ID" ] || [ "$TICKET_ID" = "null" ] || [ -z "$LINEAR_API_KEY" ]; then
            echo "No ticket ID or Linear API key — skipping"
            exit 0
          fi

          if [ "$COMMITTED" = "true" ]; then
            COMMENT="🤖 **Debug attempt ${NEXT_ATTEMPT}/5 complete:** Fix pushed at \`${NEW_SHA:0:7}\`. CI pipeline restarted."
          else
            COMMENT="🤖 **Debug attempt ${NEXT_ATTEMPT}/5:** No code changes. Manual investigation required. [Workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi

          COMMENT_BODY=$(jq -n \
            --arg issueId "$TICKET_ID" \
            --arg body "$COMMENT" \
            '{
              query: "mutation AddComment($issueId: String!, $body: String!) { commentCreate(input: { issueId: $issueId, body: $body }) { success } }",
              variables: { issueId: $issueId, body: $body }
            }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY"

          echo "Linear ticket ${TICKET_ID} updated with attempt ${NEXT_ATTEMPT} result."
