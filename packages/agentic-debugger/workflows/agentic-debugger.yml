# @Developed & Documented by Glass Box Solutions, Inc. using human ingenuity and modern technology

name: Agentic Debugger

on:
  workflow_dispatch:
    inputs:
      linear_ticket_id:
        description: "Linear ticket ID to update with attempt progress"
        required: true
        type: string
      test_failure_log:
        description: "Test failure output excerpt (max 4000 chars)"
        required: true
        type: string
      attempt_number:
        description: "Current debug attempt number (0-indexed)"
        required: true
        type: string
      commit_sha:
        description: "The develop commit SHA that triggered the CI failure"
        required: true
        type: string

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  debug:
    name: "Agentic Debug — Attempt ${{ inputs.attempt_number }}"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    services:
      postgres:
        image: pgvector/pgvector:pg16   # postgres:16 + pgvector — required by schema migrations
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: glassy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/glassy_test?schema=public
      NODE_ENV: test
      BETTER_AUTH_SECRET: test-secret-for-ci-only-not-real
      BETTER_AUTH_URL: http://localhost:3000
      PORT: 3000

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Run Prisma migrations
        run: pnpm --filter backend exec prisma migrate deploy

      - name: Re-run tests to capture fresh failure output
        continue-on-error: true
        run: |
          set +e
          touch current-failures.txt

          pnpm --filter backend test 2>&1 | tee -a current-failures.txt

          (cd backend && NODE_OPTIONS='--experimental-vm-modules' npx jest \
            --config test/jest-e2e.json --no-coverage --runInBand 2>&1) | tee -a current-failures.txt

          pnpm --filter frontend test 2>&1 | tee -a current-failures.txt

          # Always exit 0 — we want fresh output regardless of pass/fail
          exit 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run debug agent v2.0 (Claude Code CLI)
        id: debug_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ATTEMPT_NUMBER: ${{ inputs.attempt_number }}
        # exit 0: success — proceed to commit
        # exit 1: agent failed — skip commit, update ticket as failed
        # exit 2: environmental failure — skip commit, escalate ticket immediately
        continue-on-error: true
        run: |
          CURRENT_FAILURES_FILE="$(pwd)/current-failures.txt"
          export CURRENT_FAILURES_FILE
          set +e
          node scripts/debug-agent.mjs
          AGENT_EXIT=$?
          set -e
          echo "exit_code=${AGENT_EXIT}" >> $GITHUB_OUTPUT
          exit $AGENT_EXIT

      - name: Escalate ticket on environmental failure
        if: steps.debug_agent.outputs.exit_code == '2'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TICKET_ID="${{ inputs.linear_ticket_id }}"
          if [ -z "$TICKET_ID" ] || [ "$TICKET_ID" = "null" ]; then exit 0; fi

          # Mark title as human-required
          UPDATE_BODY=$(jq -n --arg id "$TICKET_ID" '{
            query: "mutation UpdateIssue($id: String!) { issueUpdate(id: $id, input: { title: \"🚨 HUMAN REQUIRED — environmental CI failure\" }) { success } }",
            variables: { id: $id }
          }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_BODY"

          COMMENT_BODY=$(jq -n --arg issueId "$TICKET_ID" \
            --arg body "🤖 **Debug agent skipped:** Environmental failure detected (missing API key, network error, or live service required). The agent cannot fix this class of failure. **Manual investigation required.** [Workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            '{ query: "mutation AddComment($issueId: String!, $body: String!) { commentCreate(input: { issueId: $issueId, body: $body }) { success } }", variables: { issueId: $issueId, body: $body } }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY"
          exit 0

      - name: Fail job if agent errored (exit 1)
        if: steps.debug_agent.outputs.exit_code == '1'
        run: |
          echo "Debug agent failed (exit 1). See logs above."
          exit 1

      - name: Configure git identity
        if: steps.debug_agent.outputs.exit_code == '0'
        run: |
          git config user.name "GBS Agentic Debugger"
          git config user.email "agentic-debugger@glassboxsolutions.com"

      - name: Commit and push agent fixes
        id: push
        if: steps.debug_agent.outputs.exit_code == '0'
        run: |
          ATTEMPT="${{ inputs.attempt_number }}"
          NEXT_ATTEMPT=$((ATTEMPT + 1))

          git add -A
          if git diff --staged --quiet; then
            echo "No changes produced by debug agent — nothing to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "$(cat <<EOF
          fix(ci): agentic debug attempt ${NEXT_ATTEMPT}

          Automated fix attempt ${NEXT_ATTEMPT}/5 for Linear ticket: ${{ inputs.linear_ticket_id }}
          Triggered by CI failure on develop at ${{ inputs.commit_sha }}

          Co-Authored-By: GBS Agentic Debugger <agentic-debugger@glassboxsolutions.com>
          EOF
          )"

          # Rebase onto any commits that arrived while Claude was running,
          # then push. Abort and exit 1 if rebase conflicts — human required.
          git fetch origin develop
          git rebase origin/develop
          git push origin develop
          echo "committed=true" >> $GITHUB_OUTPUT
          echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update Linear ticket with attempt result
        if: always()
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TICKET_ID="${{ inputs.linear_ticket_id }}"
          ATTEMPT="${{ inputs.attempt_number }}"
          NEXT_ATTEMPT=$((ATTEMPT + 1))
          COMMITTED="${{ steps.push.outputs.committed }}"
          NEW_SHA="${{ steps.push.outputs.new_sha }}"

          if [ -z "$TICKET_ID" ] || [ "$TICKET_ID" = "null" ]; then
            echo "No ticket ID — skipping Linear update"
            exit 0
          fi

          if [ "$COMMITTED" = "true" ]; then
            COMMENT="🤖 **Debug attempt ${NEXT_ATTEMPT}/5 complete:** Fix pushed to \`develop\` at \`${NEW_SHA:0:7}\`. CI pipeline restarted — waiting for results."
          else
            COMMENT="🤖 **Debug attempt ${NEXT_ATTEMPT}/5:** Debug agent produced no code changes. Manual investigation required. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi

          # Fetch current description to increment debug_attempts counter
          QUERY_BODY=$(jq -n --arg id "$TICKET_ID" '{
            query: "query GetIssue($id: String!) { issue(id: $id) { description } }",
            variables: { id: $id }
          }')
          CURRENT_DESC=$(curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$QUERY_BODY" | jq -r '.data.issue.description // ""')

          # Increment the attempt counter in the hidden metadata
          UPDATED_DESC=$(echo "$CURRENT_DESC" | \
            sed "s/<!-- debug_attempts: ${ATTEMPT} -->/<!-- debug_attempts: ${NEXT_ATTEMPT} -->/")

          UPDATE_BODY=$(jq -n \
            --arg id "$TICKET_ID" \
            --arg desc "$UPDATED_DESC" \
            '{
              query: "mutation UpdateIssue($id: String!, $desc: String!) { issueUpdate(id: $id, input: { description: $desc }) { success } }",
              variables: { id: $id, desc: $desc }
            }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_BODY"

          # Post comment with attempt result
          COMMENT_BODY=$(jq -n \
            --arg issueId "$TICKET_ID" \
            --arg body "$COMMENT" \
            '{
              query: "mutation AddComment($issueId: String!, $body: String!) { commentCreate(input: { issueId: $issueId, body: $body }) { success } }",
              variables: { issueId: $issueId, body: $body }
            }')
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY"

          echo "Linear ticket ${TICKET_ID} updated with attempt ${NEXT_ATTEMPT} result."
