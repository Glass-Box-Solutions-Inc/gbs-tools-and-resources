name: Squeegee Self-Curation

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/.planning/STATE.md'
      - '/tmp/**'
      - '.squeegee-state.json'
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC fallback
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Run Squeegee pipeline on self
        env:
          WORKSPACE: ${{ github.workspace }}
        run: node scripts/squeegee-manager.js full

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push changes directly to main
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "squeegee-bot@glassboxsolutions.com"
          git config --local user.name "Squeegee Bot"

          git add -A
          git commit -m "chore(squeegee): auto-curate documentation"
          git push origin main
