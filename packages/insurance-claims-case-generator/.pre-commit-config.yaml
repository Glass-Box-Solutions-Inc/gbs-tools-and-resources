# @Developed & Documented by Glass Box Solutions, Inc.
# Pre-commit hooks: ruff + detect-secrets + mypy
# GBS standard: equivalent to Husky + lint-staged + eslint-plugin-no-secrets

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["pydantic>=2.10", "click>=8.1"]
        args: [--ignore-missing-imports]
